<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="A classic Snakes and Ladders board game. Play against bots or online with your friends.">
  <title>Snakes & Ladders — A Game of Fate</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
</head>

<body>

  <div id="menu-screen" class="screen">
    <h1 class="menu-title">Snakes & Ladders</h1>
    <p class="menu-subtitle">A game of fate</p>

    <div class="menu-card">
      <div class="mode-toggle">
        <button type="button" class="mode-tab active" data-mode="solo">Solo</button>
        <button type="button" class="mode-tab" data-mode="online">Online</button>
      </div>

      <div id="solo-form">
        <div class="form-group">
          <label for="player-name">Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="16" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="bot-count">Opponents</label>
          <select id="bot-count">
            <option value="1">1 Bot</option>
            <option value="2" selected>2 Bots</option>
            <option value="3">3 Bots</option>
          </select>
        </div>

        <div class="ornament">✦</div>
        <button id="start-btn" class="btn btn-primary start-btn" type="button">Begin the Game</button>
      </div>

      <div id="online-form" style="display: none;">
        <div class="form-group">
          <label for="online-name">Your Name</label>
          <input type="text" id="online-name" placeholder="Enter your name" maxlength="16" autocomplete="off">
        </div>

        <div class="form-group">
          <label for="room-code-input">Room Code</label>
          <input type="text" id="room-code-input" class="code-input" placeholder="1234" maxlength="4" inputmode="numeric" autocomplete="off">
        </div>

        <div class="ornament">✦</div>

        <div class="online-actions">
          <button id="host-btn" class="btn btn-primary start-btn" type="button">Host Room</button>
          <button id="join-btn" class="btn start-btn" type="button">Join Room</button>
        </div>

        <div id="online-error" class="online-error"></div>
      </div>
    </div>
  </div>

  <div id="lobby-screen" class="screen">
    <h2 class="lobby-title">Online Lobby</h2>

    <div class="lobby-card">
      <div class="lobby-code-label">Room Code</div>
      <div id="room-code-value" class="room-code">----</div>
      <div class="lobby-code-hint">Share this code with your friends</div>

      <div class="ornament">✦</div>

      <div class="lobby-section-label">Players</div>
      <div id="lobby-player-list" class="lobby-players"></div>
      <div id="lobby-status" class="lobby-status">Waiting for players</div>

      <button id="start-game-btn" class="btn btn-primary start-btn" type="button" style="display: none;">Start Game</button>
      <button id="leave-lobby-btn" class="btn start-btn" type="button">Leave Lobby</button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="board-section">
      <div id="board-wrapper">
        <canvas id="board-canvas"></canvas>
      </div>
    </div>

    <div class="controls-bar">
      <div class="controls-left">
        <div id="turn-indicator" class="turn-indicator">Roll to Start</div>
        <div class="player-list" id="player-list"></div>
      </div>

      <div class="controls-center">
        <div id="dice-display"></div>
        <button id="roll-btn" class="btn roll-btn" disabled>Roll Dice</button>
      </div>

      <div class="controls-right">
        <button id="restart-btn" class="btn restart-btn">New Game</button>
      </div>
    </div>
  </div>

  <div id="win-overlay" class="win-overlay">
    <div class="win-card">
      <div class="win-crown">👑</div>
      <div class="win-title">Victory!</div>
      <div id="winner-name" class="win-name"></div>
      <button id="play-again-btn" class="btn btn-primary">Play Again</button>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>

</html>
